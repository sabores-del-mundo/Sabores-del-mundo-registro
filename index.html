<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores del Mundo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contenedor">

        <h1>🌍 Sabores del Mundo</h1>
        <h2>Congreso de Turismo Gastronómico</h2>

        <div class="scanner">

            <h3>Ingrese la matrícula</h3>

            <input
                type="number"
                id="matricula"
                placeholder="Ejemplo: 125381218"
            >

            <br><br>

            <button id="buscar">
                Registrar
            </button>

        </div>

        <div class="bienvenida">

            <h3>Resultado</h3>

            <h1 id="nombre">
                Esperando matrícula...
            </h1>

            <p id="mensaje">
                Ingrese una matrícula para registrar asistencia.
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
